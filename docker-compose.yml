services:
  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/webhook_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=500
      - DEFAULT_POOL_SIZE=25
    ports:
      - "6432:6432"
    depends_on: [db]

  db:
    image: postgres:18-alpine
    container_name: webhook_postgres
    restart: always
    command: postgres -c max_connections=500
    env_file: # <--- Add this line
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d webhook_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  locust:
    image: locustio/locust
    volumes:
      - ./tests/load:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://api:8000
    ports:
      - "8089:8089" # Locust Web UI
    networks:
      - default

  cache:
    image: redis:8-alpine
    container_name: webhook_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2 --loop uvloop
    restart: always
    environment:
      - APP_MODE=api
      - DB_POOL_SIZE=50
      - DB_MAX_OVERFLOW=30 # Explicitly set API mode
    env_file:
      - .env
    ports:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  worker:
    build: .
    # container_name: webhook_worker
    restart: always
    environment:
      - APP_MODE=worker
      - DB_POOL_SIZE=40
      - DB_MAX_OVERFLOW=20 # <--- CRITICAL: Tells main.py to run the Delivery Loop
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
  mock_sink:
    build:
      context: .
      dockerfile: Dockerfile.mock_sink # We'll create this next
    command: uvicorn tests.load.mock_sink:app --host 0.0.0.0 --port 8080 --workers 2
    # ports:
    # - "8080:8080" # Optional: access from host browser
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8080/webhook-sink",
          "-X",
          "POST",
          "-H",
          "Content-Type: application/json",
          "-d",
          '{"health":true}',
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: webhook-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    networks: [default]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: webhook-grafana
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports: ["3000:3000"]
    networks: [default]
    restart: unless-stopped
    depends_on: [prometheus]

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: webhook-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP receiver
      - "4317:4317" # OTLP gRPC receiver
    networks: [default]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  prometheus_data:
  grafana_data:
